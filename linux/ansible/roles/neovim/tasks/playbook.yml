- name: Install neovim
  hosts: all
  become: yes

  tasks:
    - name: Install neovim
      ansible.builtin.package:
        name:
          - neovim
        state: present

    - name: Clone Neovim config
      ansible.builtin.git:
        repo: https://github.com/MrCatNerd/MyNeovimConfig.git
        dest: "{{ ansible_facts['env']['HOME'] }}/.config/nvim"
        clone: yes
        update: yes
